<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مخازن زقزوق</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { direction: rtl; text-align: right; background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        
        /* البنر العلوي المنظم */
        .top-banner { background-color: #002244; color: #fff; text-align: center; padding: 12px; font-weight: bold; }
        .file-name-text { font-size: 14px; display: block; margin-bottom: 6px; color: #fff; }
        .admin-btn-link { background-color: #ffc107; color: #000 !important; padding: 4px 12px; border-radius: 8px; font-size: 12px; text-decoration: none; font-weight: bold; display: inline-block; }
        
        /* العناوين المطلوبة */
        .main-header { text-align: center; margin-top: 25px; margin-bottom: 20px; }
        .title-makhazen { font-size: 36px; font-weight: bold; color: #000; margin: 0; }
        .title-shop { font-size: 16px; color: #555555; margin-top: 5px; }
        
        .unified-card { border: 2px solid #000; border-radius: 20px; padding: 20px; background: #fff; margin-top: 20px; }
        .prod-title { font-size: 26px; font-weight: bold; text-align: center; color: #000; margin-bottom: 15px; }
        .info-row { display: flex; justify-content: space-between; background: #f1f1f1; padding: 10px; border-radius: 12px; margin-bottom: 10px; }
        .meters-row { background: #fff3cd; padding: 15px; border-radius: 12px; margin-top: 10px; }
        .meter-btn { border: 2px solid #000; background: #fff; padding: 5px 12px; margin: 5px; border-radius: 8px; font-weight: bold; }
        .meter-btn.disabled { border-color: #ff0000; color: #ff0000; background: #fff5f5; cursor: not-allowed; }
        .divider { border-top: 3px dashed #000; margin: 20px 0; }
    </style>
</head>
<body>

<div class="top-banner">
    <span class="file-name-text">الملف النشط حالياً  : {{ file_name }}</span>
    <a href="/admin" class="admin-btn-link">صفحة المسؤول 🔑</a>
</div>

<div class="container" style="max-width: 600px;">
    
    <div class="main-header">
        <h1 class="title-makhazen">المخازن</h1>
        <div class="title-shop">محلات زقزوق للأقمشة</div>
    </div>
    
    <div class="bg-white p-3 rounded shadow-sm border">
        <input type="text" id="searchName" class="form-control mb-2" placeholder="البحث باسم المنتج (أساسي)...">
        <input type="text" id="searchCode" class="form-control mb-2" placeholder="ادخل الكود (اختياري للوصول السريع لنفس النوع)...">
        <button onclick="doSearch()" class="btn btn-dark w-100 btn-lg">بحث سريع</button>
    </div>

    <div id="results"></div>
</div>

<div class="modal fade" id="withdrawModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px;">
            <div class="modal-body text-center p-4">
                <h5 class="fw-bold mb-3">تسجيل سحب ثوب وتصويره</h5>
                <form id="withdrawForm" enctype="multipart/form-data">
                    <input type="hidden" id="modalCode" name="code">
                    <input type="hidden" id="modalName" name="name">
                    <input type="hidden" id="modalMeter" name="meter">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">التقط صورة الثوب الخارج</label>
                        <input type="file" name="photo" class="form-control" accept="image/*" capture="environment" required>
                    </div>
                    <div class="mb-3">
                        <input type="text" name="notes" class="form-control" placeholder="ملاحظات السحب (اختياري)...">
                    </div>
                    <button type="submit" class="btn btn-danger w-100 btn-lg">تأكيد الرفع وحفظ الخارج فوراً</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let withdrawModalObj = new bootstrap.Modal(document.getElementById('withdrawModal'));

function doSearch() {
    let name = document.getElementById('searchName').value;
    let code = document.getElementById('searchCode').value;
    
    fetch('/search', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `query=${encodeURIComponent(name)}&search_code=${encodeURIComponent(code)}`
    })
    .then(res => res.json())
    .then(data => {
        let container = document.getElementById('results');
        container.innerHTML = '';
        if(data.status === 'success') {
            data.data.forEach((item) => {
                let html = `
                    <div class="unified-card">
                        <div class="prod-title">${item.name}</div>
                        <div class="info-row">
                            <div><strong>الكود:</strong> ${item.code}</div>
                            <div><strong>المكان:</strong> ${item.location}</div>
                            <div><strong>ملاحظات:</strong> ${item.notes || '-'}</div>
                        </div>
                        <div class="meters-row">
                            <div class="fw-bold mb-2">الأمتار المتوفرة (اضغط على المتر لرفع وتصوير الخارج):</div>
                            <div class="d-flex flex-wrap">`;
                            
                item.meters.forEach(m => {
                    if (m.includes('❌')) {
                        html += `<button class="meter-btn disabled" disabled>${m}</button>`;
                    } else {
                        html += `<button class="meter-btn" onclick="openWithdraw('${item.code}', '${item.name}', '${m}')">${m}</button>`;
                    }
                });
                
                html += `   </div>
                        </div>
                    </div>
                    <div class="divider"></div>`;
                container.innerHTML += html;
            });
        } else {
            container.innerHTML = `<div class="alert alert-danger text-center mt-3">${data.msg}</div>`;
        }
    });
}

function openWithdraw(code, name, meter) {
    document.getElementById('modalCode').value = code;
    document.getElementById('modalName').value = name;
    document.getElementById('modalMeter').value = meter;
    withdrawModalObj.show();
}

document.getElementById('withdrawForm').addEventListener('submit', function(e) {
    e.preventDefault();
    fetch('/withdraw', { method: 'POST', body: new FormData(this) })
    .then(res => res.json())
    .then(data => {
        withdrawModalObj.hide();
        alert(data.msg);
        doSearch();
    });
});
</script>
</body>
</html>
