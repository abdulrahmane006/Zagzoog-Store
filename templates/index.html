<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مخازن زقزوق</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { direction: rtl; text-align: right; background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .file-banner { background-color: #002244; color: #fff; text-align: center; padding: 8px; font-weight: bold; font-size: 14px; }
        .unified-card { border: 2px solid #000; border-radius: 20px; padding: 20px; background: #fff; margin-top: 20px; }
        .prod-title { font-size: 26px; font-weight: bold; text-align: center; color: #000; margin-bottom: 15px; }
        .info-row { display: flex; justify-content: space-between; background: #f1f1f1; padding: 10px; border-radius: 12px; margin-bottom: 10px; }
        .meters-row { background: #fff3cd; padding: 15px; border-radius: 12px; margin-top: 10px; }
        .meter-btn { border: 2px solid #000; background: #fff; padding: 5px 12px; margin: 5px; border-radius: 8px; font-weight: bold; }
        .divider { border-top: 3px dashed #000; margin: 20px 0; }
    </style>
</head>
<body>

<!-- عرض اسم ملف الإكسيل بصورة دائمة ودورية في أعلى الموقع -->
<div class="file-banner">
    الملف النشط حالياً في درايف: <span id="fileNameDisplay">{{ file_name }}</span>
</div>

<div class="container" style="max-width: 600px; margin-top: 20px;">
    <h2 class="text-center fw-bold">محلات زقزوق - المخازن</h2>
    
    <!-- خانات البحث السريع -->
    <div class="bg-white p-3 rounded shadow-sm mt-3">
        <input type="text" id="searchName" class="form-control mb-2" placeholder="البحث باسم المنتج...">
        <div class="input-group mb-2">
            <input type="text" id="searchCode" class="form-control" placeholder="أو ادخل الكود للوصول السريع...">
            <button onclick="doSearch()" class="btn btn-dark">بحث سريع</button>
        </div>
    </div>

    <div id="results"></div>
</div>

<script>
function doSearch() {
    let name = document.getElementById('searchName').value;
    let code = document.getElementById('searchCode').value;
    
    fetch('/search', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `query=${encodeURIComponent(name)}&search_code=${encodeURIComponent(code)}`
    })
    .then(res => res.json())
    .then(data => {
        let container = document.getElementById('results');
        container.innerHTML = '';
        if(data.status === 'success') {
            data.data.forEach((item, idx) => {
                let html = `
                    <div class="unified-card">
                        <!-- الاسم في المنتصف -->
                        <div class="prod-title">${item.name}</div>
                        
                        <!-- الصف الخاص بالكود والمكان والملاحظات -->
                        <div class="info-row">
                            <div><strong>الكود:</strong> ${item.code}</div>
                            <div><strong>المكان:</strong> ${item.location}</div>
                            <div><strong>ملاحظات:</strong> ${item.notes || '-'}</div>
                        </div>
                        
                        <!-- صف أسفل منه يعرض جميع أمتار الأثواب -->
                        <div class="meters-row">
                            <div class="fw-bold mb-2">أمتار الأثواب المتوفرة (اضغط للسحب):</div>
                            <div class="d-flex flex-wrap">`;
                            
                item.meters.forEach(m => {
                    html += `<button class="meter-btn" onclick="withdrawMeter('${item.code}', '${m}')">${m}</button>`;
                });
                
                html += `   </div>
                        </div>
                    </div>
                    <div class="divider"></div>`;
                container.innerHTML += html;
            });
        } else {
            container.innerHTML = `<div class="alert alert-danger text-center mt-3">${data.msg}</div>`;
        }
    });
}

function withdrawMeter(code, meter) {
    if(confirm(`هل تريد تأكيد سحب الثوب مقاس ${meter}؟`)) {
        fetch('/withdraw', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `code=${code}&meter=${encodeURIComponent(meter)}`
        })
        .then(res => res.json())
        .then(data => { alert(data.msg); doSearch(); });
    }
}
</script>
</body>
</html>
